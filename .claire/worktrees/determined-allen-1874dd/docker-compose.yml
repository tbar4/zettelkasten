services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zk
      POSTGRES_PASSWORD: zk
      POSTGRES_DB: zettel
    ports:
      - "5432:5432"
    volumes:
      - zk-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zk -d zettel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - zk-redis-data:/data

volumes:
  zk-postgres-data:
  zk-redis-data:
